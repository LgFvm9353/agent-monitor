<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor SDK Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    .container { max-width: 960px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 28px; margin-bottom: 8px; }
    h1 span { color: #6366f1; }
    .subtitle { color: #94a3b8; margin-bottom: 32px; font-size: 14px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; }
    .card h3 { font-size: 14px; color: #94a3b8; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
    .btn { display: block; width: 100%; padding: 10px 16px; margin-bottom: 8px; border: 1px solid #475569; border-radius: 8px;
           background: #334155; color: #e2e8f0; font-size: 13px; cursor: pointer; text-align: left; transition: all 0.15s; }
    .btn:hover { background: #475569; border-color: #6366f1; }
    .btn.danger { border-color: #dc262640; }
    .btn.danger:hover { background: #dc262620; border-color: #dc2626; color: #fca5a5; }
    .btn.warn { border-color: #f59e0b40; }
    .btn.warn:hover { background: #f59e0b20; border-color: #f59e0b; color: #fcd34d; }
    .btn.success { border-color: #16a34a40; }
    .btn.success:hover { background: #16a34a20; border-color: #16a34a; color: #86efac; }
    .log-panel { background: #0c1222; border: 1px solid #334155; border-radius: 12px; padding: 16px; max-height: 400px; overflow-y: auto; }
    .log-panel h3 { font-size: 14px; color: #94a3b8; margin-bottom: 12px; display: flex; justify-content: space-between; }
    .log-entry { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 12px; padding: 6px 8px; margin-bottom: 4px;
                 border-radius: 4px; border-left: 3px solid transparent; line-height: 1.5; }
    .log-entry.error { border-left-color: #dc2626; background: #dc262610; }
    .log-entry.performance { border-left-color: #f59e0b; background: #f59e0b10; }
    .log-entry.behavior { border-left-color: #10b981; background: #10b98110; }
    .log-entry.custom { border-left-color: #6366f1; background: #6366f110; }
    .log-entry .ts { color: #64748b; margin-right: 8px; }
    .log-entry .type-tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; margin-right: 8px; }
    .type-tag.error { background: #dc262630; color: #fca5a5; }
    .type-tag.performance { background: #f59e0b30; color: #fcd34d; }
    .type-tag.behavior { background: #10b98130; color: #6ee7b7; }
    .type-tag.custom { background: #6366f130; color: #a5b4fc; }
    .clear-btn { background: transparent; border: 1px solid #475569; color: #94a3b8; padding: 4px 12px;
                 border-radius: 6px; cursor: pointer; font-size: 12px; }
    .clear-btn:hover { border-color: #6366f1; color: #e2e8f0; }
    .status-bar { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; font-size: 13px; flex-wrap: wrap; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .status-dot.live { background: #10b981; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .stats { display: flex; gap: 24px; margin-left: auto; }
    .stats span { color: #94a3b8; }
    .stats strong { color: #e2e8f0; }
    .hint { font-size: 11px; color: #64748b; margin-top: 8px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 <span>Monitor SDK</span> 功能验证</h1>
    <p class="subtitle">点击按钮触发事件 → 日志面板实时展示 → 同时上报到 Server</p>

    <div class="status-bar">
      <span><span class="status-dot live"></span> SDK 运行中</span>
      <span style="color:#64748b;">Session: <span id="sessionId" style="color:#6366f1">-</span></span>
      <div class="stats">
        <span>已捕获: <strong id="reportCount">0</strong></span>
        <span>已上报: <strong id="sentCount">0</strong></span>
        <span>被丢弃: <strong id="dropCount">0</strong></span>
      </div>
    </div>

    <div class="grid">
      <!-- 错误触发 -->
      <div class="card">
        <h3>❌ 错误事件</h3>
        <button class="btn danger" onclick="triggerJSError()">throw new Error('JS 运行时错误')</button>
        <button class="btn danger" onclick="triggerPromiseError()">Promise.reject('未处理的 Promise')</button>
        <button class="btn danger" onclick="triggerResourceError()">加载不存在的图片资源</button>
        <button class="btn danger" onclick="triggerConsoleError()">console.error('错误日志')</button>
        <p class="hint">错误去重：同类型/同位置错误只上报一次</p>
      </div>

      <!-- 行为触发 -->
      <div class="card">
        <h3>👆 行为事件</h3>
        <button class="btn" onclick="triggerRouteChange()"># 修改 URL hash</button>
        <button class="btn success" onclick="triggerXHR()">发送 XHR 请求 (JSONPlaceholder)</button>
        <button class="btn warn" onclick="triggerErrorFetch()">发送 404 请求</button>
        <button class="btn" onclick="addBreadcrumb()">手动添加面包屑</button>
        <p class="hint">页面按钮点击本身也会产生面包屑</p>
      </div>

      <!-- 自定义 & 控制 -->
      <div class="card">
        <h3>🛠️ 自定义 & 控制</h3>
        <button class="btn" onclick="triggerCustomEvent()">monitor.report({ type: 'custom' })</button>
        <button class="btn" onclick="testBeforeSend()">测试 beforeSend 过滤</button>
        <button class="btn" onclick="dumpMonitorState()">📋 打印 Monitor 状态到 Console</button>
        <button class="btn" onclick="testDedup()">测试错误去重（同一错误报3次）</button>
      </div>
    </div>

    <!-- 日志面板 -->
    <div class="log-panel">
      <h3>
        📋 事件日志
        <button class="clear-btn" onclick="clearLogs()">清空</button>
      </h3>
      <div id="logEntries"></div>
    </div>
  </div>

  <!-- 使用 SDK IIFE 构建产物 -->
  <script src="sdk.js"></script>
  <script>
    var reportCount = 0;
    var dropCount = 0;
    var sentCount = 0;

    // ===== 初始化 SDK =====
    var monitor = new AgentHarnessMonitor.Monitor({
      reportUrl: 'http://localhost:3001/api/monitor/report',
      appId: 'sdk-demo',
      enabled: true,
      sampleRate: 1,
      debug: true,
      transport: { batchSize: 1, flushInterval: 2000 },
      // beforeSend: 镜像到日志面板
      beforeSend: function(event) {
        reportCount++;
        addLog(event);
        // 在 Console 也打印完整事件，方便看结构
        console.log('[beforeSend]', event.type, event.data);
        return event;
      },
    });

    monitor.use(new AgentHarnessMonitor.ErrorPlugin());
    monitor.use(new AgentHarnessMonitor.PerformancePlugin());
    monitor.use(new AgentHarnessMonitor.BehaviorPlugin());
    monitor.start();

    document.getElementById('sessionId').textContent = monitor.getSessionId().substring(0, 14) + '...';

    // 模拟 Transport.enqueue 被调用 = 实际上报
    // 由于 Transport 是私有的，这里每 3 秒轮询估算
    setInterval(function() {
      sentCount = reportCount; // 简化：通过 pipeline 的事件数 ≈ 实际上报数
      document.getElementById('sentCount').textContent = sentCount;
    }, 3000);

    // ===== 日志面板 =====
    function addLog(event) {
      var container = document.getElementById('logEntries');
      var entry = document.createElement('div');
      entry.className = 'log-entry ' + event.type;
      var time = new Date(event.timestamp).toLocaleTimeString();
      var typeLabel = event.type.toUpperCase();
      var summary = '';
      if (event.type === 'error') {
        summary = event.data.errorType + ': ' + (event.data.message || '').substring(0, 80);
      } else if (event.type === 'performance') {
        summary = event.data.perfType;
        if (event.data.lcp !== undefined) summary += ' LCP=' + Math.round(event.data.lcp) + 'ms';
        if (event.data.fcp !== undefined) summary += ' FCP=' + Math.round(event.data.fcp) + 'ms';
        if (event.data.ttfb !== undefined) summary += ' TTFB=' + Math.round(event.data.ttfb) + 'ms';
        if (event.data.customMetrics && event.data.customMetrics.longTaskCount) {
          summary += ' LongTasks=' + event.data.customMetrics.longTaskCount;
        }
      } else if (event.type === 'behavior') {
        summary = event.data.behaviorType;
        if (event.data.behaviorType === 'click') summary += ' → ' + (event.data.tagName || '');
        if (event.data.behaviorType === 'route') summary += ' → ' + (event.data.to || '');
        if (event.data.behaviorType === 'http') summary += ' ' + event.data.method + ' ' + event.data.status;
      } else {
        summary = event.data.name || JSON.stringify(event.data).substring(0, 60);
      }
      entry.innerHTML = '<span class="ts">' + time + '</span>' +
        '<span class="type-tag ' + event.type + '">' + typeLabel + '</span>' +
        summary;
      container.prepend(entry);
      document.getElementById('reportCount').textContent = reportCount;
      // 限制日志条数
      while (container.children.length > 50) container.lastChild.remove();
    }

    function addInfoLog(msg) {
      var container = document.getElementById('logEntries');
      var entry = document.createElement('div');
      entry.className = 'log-entry custom';
      entry.innerHTML = '<span class="ts">' + new Date().toLocaleTimeString() + '</span>' +
        '<span class="type-tag custom">INFO</span>' + msg;
      container.prepend(entry);
      while (container.children.length > 50) container.lastChild.remove();
    }

    function clearLogs() {
      document.getElementById('logEntries').innerHTML = '';
      reportCount = 0;
      dropCount = 0;
      sentCount = 0;
      document.getElementById('reportCount').textContent = '0';
      document.getElementById('sentCount').textContent = '0';
      document.getElementById('dropCount').textContent = '0';
    }

    // ===== 事件触发函数 =====
    function triggerJSError() {
      addInfoLog('即将 throw Error...');
      setTimeout(function() {
        throw new Error('SDK Demo: JS 运行时错误 @ ' + new Date().toISOString());
      }, 100);
    }

    function triggerPromiseError() {
      addInfoLog('即将 Promise.reject...');
      Promise.reject(new Error('SDK Demo: Promise 未处理拒绝'));
    }

    function triggerResourceError() {
      var img = document.createElement('img');
      img.src = 'https://this.domain.does.not.exist.xyz/404.png';
      img.style.display = 'none';
      document.body.appendChild(img);
      addInfoLog('已尝试加载: ' + img.src + ' (等待 error 事件)');
    }

    function triggerConsoleError() {
      console.error('SDK Demo: console.error 劫持测试', { time: Date.now(), extra: 'data' });
      addInfoLog('console.error 已调用 → SDK 已劫持并上报');
    }

    function triggerRouteChange() {
      var hash = '#/page/' + Math.random().toString(36).substring(2, 6);
      window.location.hash = hash;
      addInfoLog('Hash 已修改为: ' + hash);
    }

    function triggerXHR() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', 'https://jsonplaceholder.typicode.com/posts/1');
      xhr.onloadend = function() {
        addInfoLog('XHR 完成: status=' + xhr.status + ' duration < 1s (正常请求不触发监控)');
      };
      xhr.send();
      addInfoLog('XHR 已发送: GET /posts/1');
    }

    function triggerErrorFetch() {
      addInfoLog('发送 404 Fetch...');
      fetch('https://jsonplaceholder.typicode.com/nonexistent/99999')
        .then(function(r) {
          addInfoLog('Fetch 完成: status=' + r.status + ' → SDK 会捕获本次 http 事件');
        })
        .catch(function() {
          addInfoLog('Fetch 失败（网络错误）→ SDK 会捕获');
        });
    }

    function addBreadcrumb() {
      monitor.addBreadcrumb({
        type: 'click',
        message: '手动面包屑 #' + Date.now(),
        data: { source: 'demo-button' },
      });
      addInfoLog('面包屑已添加');
    }

    function triggerCustomEvent() {
      monitor.report({
        type: 'custom',
        timestamp: Date.now(),
        data: { name: 'demo-custom-event', payload: { button: '测试按钮', ts: Date.now() } },
      });
      addInfoLog('自定义事件已上报');
    }

    function testBeforeSend() {
      dropCount++;
      document.getElementById('dropCount').textContent = dropCount;
      addInfoLog('beforeSend 测试: 当前模式为「全部放行」');
      addInfoLog('  → 修改 monitor 初始化时 beforeSend 返回 null 即可丢弃指定事件');
    }

    function testDedup() {
      addInfoLog('连续抛出 3 个相同错误（相同堆栈签名）→ 去重后只上报 1 次');
      for (var i = 0; i < 3; i++) {
        setTimeout(function() {
          throw new Error('SDK Demo: 去重测试 — 相同错误');
        }, i * 200);
      }
    }

    function dumpMonitorState() {
      console.log('===== Monitor SDK 状态 =====');
      console.log('实例:', monitor);
      console.log('配置:', monitor.config);
      console.log('Session ID:', monitor.getSessionId());
      console.log('Plugin 数量:', 3, '(Error, Performance, Behavior)');
      console.log('============================');
      addInfoLog('完整状态已打印到 Console → 按 F12 查看');
    }

    // 暴露到全局
    window.__monitor__ = monitor;
  </script>
</body>
</html>
